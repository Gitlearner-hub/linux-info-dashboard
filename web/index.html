<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor Linux</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Monitor Linux desplegado desde GitHub Codespaces</h1>

    <p><strong>Hostname:</strong> <span id="hostname"></span></p>
    <p><strong>Sistema:</strong> <span id="os"></span></p>
    <p><strong>Kernel:</strong> <span id="kernel"></span></p>
    <p><strong>Uptime:</strong> <span id="uptime"></span></p>

    <p><strong>CPU:</strong> <span id="cpu"></span></p>
    <p><strong>Memoria usada:</strong> <span id="mem-used"></span></p>

    <!-- Información de Docker -->
    <hr>
    <h2>Información de Docker</h2>
    
    <p><strong>Versión de Docker:</strong> <span id="docker-version"></span></p>
    <p><strong>Contenedores activos:</strong> <span id="docker-containers-running"></span></p>
    <p><strong>Contenedores totales:</strong> <span id="docker-containers-total"></span></p>
    <p><strong>Imágenes:</strong> <span id="docker-images"></span></p>
    <p><strong>Volúmenes:</strong> <span id="docker-volumes"></span></p>

    <script src="app.js"></script>

</body>
</html>
